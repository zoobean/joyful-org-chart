<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Joyful Reading Co — org chart</title>
<style>
  :root { --line:#82827a; --card-border:#cfcfc8; --green:#0a5c4a; }
  body { font-family: Arial, Helvetica, sans-serif; background:#fafaf8; margin:0; padding:24px; color:#222; }
  .logo { font-weight:700; font-size:20px; color:var(--green); margin-bottom:24px; }

  .scroller { overflow-x:auto; }
  .canvas { position:relative; width:max-content; padding:4px; }
  #lines { position:absolute; top:0; left:0; pointer-events:none; }
  .content { position:relative; }

  .ceo-row { margin-bottom:64px; }
  .ceo-row .person { width:196px; }

  .columns { display:flex; gap:20px; align-items:flex-start; }
  .col { width:196px; flex:none; }
  .col.slim { width:188px; }

  .person { border:1px solid var(--card-border); background:#fff; border-radius:6px;
    padding:7px 9px; font-size:12px; box-sizing:border-box; }
  .person .name { font-weight:700; color:var(--green); }
  .person .title { color:#666; font-size:11px; margin-top:1px; }

  .pill-row { position:relative; margin:8px 0 8px 26px; display:flex; justify-content:flex-start; }
  .pill { background:#c9ecf3; color:#066b7a; font-size:10px; font-weight:700;
    letter-spacing:.05em; text-transform:uppercase; padding:3px 12px; border-radius:999px; }
  .pill-row::before {
    content:""; position:absolute; left:-16px; top:-8px; width:13px; height:19px;
    border-left:2px solid var(--line); border-bottom:2px solid var(--line); border-bottom-left-radius:7px;
  }
  .pill-row.has-team::after {
    content:""; position:absolute; left:-16px; top:-8px; bottom:-10px;
    border-left:2px solid var(--line);
  }
  .pill-row.spine-out::after {
    content:""; position:absolute; left:-16px; top:-8px; bottom:-12px;
    border-left:2px solid var(--line);
  }

  .node { margin-bottom:8px; }
  .children { margin-left:10px; padding-left:16px; margin-top:8px; }
  .children > .node { position:relative; }
  .children > .node::before {
    content:""; position:absolute; left:-16px; top:-8px; width:13px; height:28px;
    border-left:2px solid var(--line); border-bottom:2px solid var(--line); border-bottom-left-radius:7px;
  }
  .children > .node:not(:last-child)::after {
    content:""; position:absolute; left:-16px; top:-8px; bottom:-8px;
    border-left:2px solid var(--line);
  }

  .lainey-wrap { margin-bottom:44px; }
  .lainey-block { width:188px; }
  .group-cols { display:flex; gap:20px; align-items:flex-start; }
</style>
</head>
<body>

<div class="logo">Joyful Reading Co — org chart</div>

<div class="scroller">
  <div class="canvas" id="canvas">
    <svg id="lines"></svg>
    <div class="content">
      <div class="ceo-row">
        <div class="person" data-node="felix">
          <div class="name">Felix Lloyd</div><div class="title">CEO</div>
        </div>
      </div>
      <div class="columns" id="chart"></div>
    </div>
  </div>
</div>

<script>
const person = (name, title, children) => ({ name, title, children });

const cols = [
  { anchor:"hiser", name:"Product", head:person("Kelly Hiser","VP of Product"), reports:[
    person("Moni Barrette","Collection Development Team Lead"),
    person("Amber Mitchell","Metadata Manager"),
    person("Rob Randle","Content Manager"),
    person("Mike Kuzin","Principal Designer"),
    person("Brooke Keene","Beanstack Product Manager"),
    person("Elizabeth Ross","Product Support Team Manager",[
      person("Camille Perez","Product Support Specialist"),
      person("Jenny Plummer","Product Support Team Lead",[
        person("Simon Desalvo","Product Support Associate")
      ])
    ])
  ]},
  { anchor:"singer", name:"PAL", head:person("Ian Singer","GM, Public Libraries & Academic"), reports:[
    person("Jeremy Vaux","Account Executive"),
    person("Jillian Tweet","Account Executive"),
    person("Joe Barrette","Account Executive"),
    person("Cleo Joyce","Manager of PAL Success",[
      person("Heidi Kunkel","Library Success Manager"),
      person("Kat Gatcomb","Library Success Manager")
    ])
  ]},
  { anchor:"hopp", name:"School sales", head:person("Dave Hopp","VP of Sales"), reports:[
    person("Don Giacomini","Principal Account Executive"),
    person("Lauren Brami","Business Development Team Lead",[
      person("Becca Traxler","Account Executive"),
      person("Andrea Mullon","Business Development Rep"),
      person("Beth Halaz","Account Executive"),
      person("Steven DiMiceli","Business Development Rep"),
      person("Bryana Snyder","Account Executive"),
      person("Francheska Savage","Business Development Rep"),
      person("Chelsea McCoy","Account Executive"),
      person("Ciera Baker","Assoc. Business Development Rep"),
      person("Jessica Fulton","Account Executive")
    ]),
    person("Michael Kideckel","Business Development Team Lead",[
      person("TBD","Account Executive"),
      person("Esmy Clavel","Business Development Rep"),
      person("Amanda Taylor","Associate Account Executive"),
      person("Akua Peprah","Assoc. Business Development Rep"),
      person("Amanda Garner","Assoc. Business Development Rep"),
      person("Haven Gotham","Business Development Rep")
    ])
  ]},
  { anchor:"conway", name:"School client success", head:person("Shaun Conway","VP of Client Success"), reports:[
    person("Lauren Hantzes","School Success Team Lead",[
      person("Danysha Ligon","School Success Manager"),
      person("Hugh Burke","School Success Manager")
    ]),
    person("Tammy McIntyre","School Success Team Lead",[
      person("Vickie Blankenship","School Success Manager"),
      person("Alexandra Tolbert","School Success Manager"),
      person("Emily Peterson","School Success Manager"),
      person("Kelly Williams","School Success Manager"),
      person("Stella Bromley","School Success Manager")
    ])
  ]},
  { anchor:"ewing", name:"Engineering", head:person("Tyler Ewing","CTO"), reports:[
    person("Josh Oiknine","Director of Eng, Comics Plus"),
    person("Mike Berse","Dir. of Product Dev, Comics Plus"),
    person("Jade Ornelas","Staff Site Reliability Engineer"),
    person("Antonio Chavez","Staff Engineer"),
    person("Vincent Mendiola","Senior Developer"),
    person("Alejandro Zaizar","Engineer"),
    person("Josh Joson","Engineer"),
    person("Armando Duran","Senior React Native Developer"),
    person("Rachel McGrane","Front End Design Engineer"),
    person("TBD","Senior Developer")
  ]}
];

const marketing = { anchor:"burke", name:"Marketing", head:person("Kelly Burke","Sr. Director of Marketing"), reports:[
  person("Meghan Olivier","Senior Marketing Manager, Growth"),
  person("Lilly Sundell-Thomas","Marketing Manager, Client Engagement"),
  person("Brittinee Phillips","Associate Marketing Manager, Growth"),
  person("Paktra Lynch","Assoc. Marketing Manager, Social & Events"),
  person("Sophie Houghton","Marketing Designer")
]};

const bizops = { anchor:"akshat", name:"Business operations", head:person("Akshat Khandelwal","Sr. Director of Business Operations"), reports:[
  person("Alex Burnsides","Revenue Enablement & Ops Manager"),
  person("Katlin Williams","Hubspot Specialist"),
  person("Troy Pender","Business Operations Manager")
]};

function personHTML(p, anchor) {
  let html = `<div class="node">`
    + `<div class="person"${anchor ? ` data-node="${anchor}"` : ''}>`
    + `<div class="name">${p.name}</div><div class="title">${p.title}</div></div>`;
  if (p.children && p.children.length) {
    html += `<div class="children">${p.children.map(c => personHTML(c)).join('')}</div>`;
  }
  html += `</div>`;
  return html;
}

function colHTML(col, slim) {
  return `<div class="col${slim ? ' slim' : ''}">
    <div class="node">
      <div class="person" data-node="${col.anchor}">
        <div class="name">${col.head.name}</div>
        <div class="title">${col.head.title}</div>
      </div>
      <div class="pill-row has-team"><span class="pill">${col.name}</span></div>
      <div class="children">${col.reports.map(r => personHTML(r)).join('')}</div>
    </div>
  </div>`;
}

function bizopsColHTML() {
  return `<div class="col slim">
    <div class="node">
      <div class="person" data-node="akshat">
        <div class="name">${bizops.head.name}</div>
        <div class="title">${bizops.head.title}</div>
      </div>
      <div class="pill-row has-team"><span class="pill">${bizops.name}</span></div>
      <div class="children">${bizops.reports.map(r => personHTML(r)).join('')}</div>
    </div>
    <div class="node" style="margin-top:16px;">
      <div class="person" data-node="lindsey">
        <div class="name">Lindsey Hill</div>
        <div class="title">Executive Business Partner</div>
      </div>
    </div>
  </div>`;
}

function groupHTML() {
  return `<div class="group">
    <div class="lainey-wrap">
      <div class="lainey-block" data-node="lainey">
        <div class="person">
          <div class="name">Lainey Franks</div>
          <div class="title">Chief Business Officer</div>
        </div>
        <div class="pill-row spine-out"><span class="pill">Business optimization</span></div>
      </div>
    </div>
    <div class="group-cols">
      ${colHTML(marketing, true)}
      ${bizopsColHTML()}
    </div>
  </div>`;
}

document.getElementById('chart').innerHTML =
  colHTML(cols[0]) + groupHTML() + cols.slice(1).map(c => colHTML(c)).join('');

function drawLines() {
  const canvas = document.getElementById('canvas');
  const svg = document.getElementById('lines');
  svg.setAttribute('width', canvas.scrollWidth);
  svg.setAttribute('height', canvas.scrollHeight);
  svg.innerHTML = '';
  const cRect = canvas.getBoundingClientRect();

  const box = sel => {
    const r = document.querySelector(`[data-node="${sel}"]`).getBoundingClientRect();
    return {
      x: r.left - cRect.left + r.width / 2,
      left: r.left - cRect.left,
      top: r.top - cRect.top,
      bottom: r.top - cRect.top + r.height,
      midY: r.top - cRect.top + r.height / 2
    };
  };

  function addPath(d) {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', '#82827a');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  }

  function bus(manager, kids, opts = {}) {
    const m = box(manager);
    const mx = opts.spineLeft ? m.left + 10 : m.x;
    const ks = kids.map(box);
    const railY = Math.min(...ks.map(k => k.top)) - 18;
    let d = `M ${mx} ${m.bottom} V ${railY}`;
    const xs = ks.map(k => k.x).concat(mx);
    if (opts.extraX !== undefined) xs.push(opts.extraX);
    d += ` M ${Math.min(...xs)} ${railY} H ${Math.max(...xs)}`;
    ks.forEach(k => { d += ` M ${k.x} ${railY} V ${k.top}`; });
    addPath(d);
    return railY;
  }

  bus('felix', ['hiser', 'lainey', 'singer', 'hopp', 'conway', 'ewing']);

  const lin = box('lindsey');
  const gutterX = lin.left - 10;
  const railY = bus('lainey', ['burke', 'akshat'], { spineLeft: true, extraX: gutterX });
  addPath(`M ${gutterX} ${railY} V ${lin.midY - 7} Q ${gutterX} ${lin.midY} ${gutterX + 7} ${lin.midY} H ${lin.left}`);
}

window.addEventListener('load', drawLines);
window.addEventListener('resize', drawLines);
drawLines();
</script>
</body>
</html>
